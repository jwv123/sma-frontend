<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/products/shareshift/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content — ShareShift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;400;600;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #034985;
            --navy: #024980;
            --blue-mid: #1280C0;
            --blue-bright: #40A0E0;
            --ice: #E0F0F8;
            --ice-light: #B8E0F0;
            --text-primary: #1A2B3D;
            --text-secondary: #4A6078;
            --text-muted: #8A9BB0;
            --surface: #F5F8FB;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(3, 73, 133, 0.1);
            --glass-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(3, 73, 133, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            color: var(--text-primary);
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Sora', sans-serif; }
        body input, body textarea { color: var(--text-primary); }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 2rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 1px 4px rgba(3, 73, 133, 0.04);
        }

        .navbar-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }

        .navbar-logo {
            width: 60px; height: 60px; border-radius: 14px; overflow: hidden;
            border: 1px solid var(--glass-border); box-shadow: 0 2px 8px rgba(3, 73, 133, 0.08); flex-shrink: 0;
            transition: all 0.3s;
        }

        .navbar-logo img { width: 100%; height: 100%; object-fit: cover; }
        .navbar-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--navy-deep); }

        .nav-toggle {
            display: none; flex-direction: column; gap: 5px;
            background: none; border: none; cursor: pointer; padding: 0.5rem; z-index: 110;
        }

        .nav-toggle span {
            display: block; width: 24px; height: 2px;
            background: var(--navy-deep); border-radius: 2px; transition: all 0.3s;
        }

        .nav-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.open span:nth-child(2) { opacity: 0; }
        .nav-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .navbar-center { display: flex; gap: 0.25rem; align-items: center; }

        .nav-link {
            color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
            padding: 0.5rem 1rem; border-radius: 10px; transition: all 0.2s; white-space: nowrap;
        }

        .nav-link:hover { color: var(--navy-deep); background: rgba(3, 73, 133, 0.05); }
        .nav-link.active { color: var(--blue-mid); background: rgba(18, 128, 192, 0.08); }

        .btn-signout {
            padding: 0.5rem 1.25rem; border-radius: 10px; font-family: 'Sora', sans-serif;
            font-weight: 600; font-size: 0.82rem; cursor: pointer;
            border: 1px solid rgba(220, 53, 69, 0.2); background: rgba(220, 53, 69, 0.06); color: #A82030; transition: all 0.2s;
        }

        .btn-signout:hover { background: rgba(220, 53, 69, 0.12); color: #881828; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
            box-shadow: var(--glass-shadow);
        }

        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(3, 73, 133, 0.15), transparent);
        }

        .card-title { font-family: 'Sora', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--navy-deep); }

        .form-group { margin-bottom: 1.25rem; }

        .form-group label {
            display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;
            color: var(--text-secondary); letter-spacing: 0.03em;
        }

        .frost-input {
            width: 100%; padding: 0.75rem 1rem; border-radius: 12px;
            border: 1px solid rgba(3, 73, 133, 0.12); background: #FFFFFF;
            color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
            transition: all 0.3s ease; outline: none;
        }

        .frost-input::placeholder { color: var(--text-muted); }
        .frost-input:focus { border-color: rgba(18, 128, 192, 0.5); box-shadow: 0 0 0 3px rgba(18, 128, 192, 0.1); }

        textarea.frost-input { resize: vertical; min-height: 80px; }

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.65rem 1.5rem; border-radius: 12px; font-family: 'Sora', sans-serif;
            font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none;
            transition: all 0.3s; margin-right: 0.5rem;
            background: linear-gradient(135deg, #1280C0, #40A0E0); color: #FFFFFF;
            box-shadow: 0 4px 16px rgba(18, 128, 192, 0.25);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(18, 128, 192, 0.35); }

        .btn-secondary {
            display: inline-flex; background: #FFFFFF; border: 1px solid var(--glass-border); color: var(--navy-deep);
            padding: 0.65rem 1.5rem; border-radius: 12px; font-family: 'Sora', sans-serif;
            font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; margin-right: 0.5rem;
        }

        .btn-secondary:hover { background: var(--surface); box-shadow: 0 2px 8px rgba(3, 73, 133, 0.08); }

        .btn-danger {
            display: inline-flex; padding: 0.65rem 1.5rem; border-radius: 12px;
            font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s; margin-right: 0.5rem;
            border: 1px solid rgba(220, 53, 69, 0.2); background: rgba(220, 53, 69, 0.06); color: #A82030;
        }

        .btn-danger:hover { background: rgba(220, 53, 69, 0.12); }

        .btn-edit {
            display: inline-flex; padding: 0.65rem 1.5rem; border-radius: 12px;
            font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s; margin-right: 0.5rem;
            border: 1px solid rgba(18, 128, 192, 0.2); background: rgba(18, 128, 192, 0.06); color: var(--blue-mid);
        }

        .btn-edit:hover { background: rgba(18, 128, 192, 0.12); }

        .content-item {
            background: #FFFFFF; border: 1px solid var(--glass-border); border-radius: 14px;
            padding: 1.25rem; margin-bottom: 0.75rem;
            display: flex; justify-content: space-between; align-items: center; transition: all 0.2s;
        }

        .content-item:hover { border-color: rgba(18, 128, 192, 0.2); box-shadow: 0 2px 8px rgba(3, 73, 133, 0.05); }

        .message { padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 12px; font-size: 0.9rem; }
        .success { background: rgba(40, 167, 69, 0.1); border: 1px solid rgba(40, 167, 69, 0.2); color: #1A7A30; }
        .error { background: rgba(220, 53, 69, 0.08); border: 1px solid rgba(220, 53, 69, 0.2); color: #A82030; }

        .site-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .site-footer a {
            color: var(--blue-mid);
            text-decoration: none;
            transition: color 0.2s;
        }

        .site-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .navbar { padding: 0.75rem 1rem; }
            .nav-toggle { display: flex; }
            .navbar-logo { width: 44px; height: 44px; border-radius: 10px; }
            .navbar-name { font-size: 1.15rem; }
            .navbar-center {
                display: none; position: absolute; top: 100%; left: 0; right: 0;
                flex-direction: column; background: rgba(255, 255, 255, 0.97);
                backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--glass-border);
                box-shadow: 0 8px 24px rgba(3, 73, 133, 0.08);
                padding: 1rem; gap: 0.25rem;
            }
            .navbar-center.open { display: flex; }
            .nav-link { padding: 0.75rem 1rem; border-radius: 10px; }
            .btn-signout { margin-top: 0.5rem; width: 100%; text-align: center; justify-content: center; }
            .container { padding: 1rem; }
            .glass-card { padding: 1.5rem; }
            .content-item { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
            .content-item > div:last-child { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        }

        @media (max-width: 480px) {
            .navbar-logo { width: 40px; height: 40px; border-radius: 8px; }
            .navbar-name { font-size: 1.05rem; }
            .container { padding: 0.75rem; }
            .glass-card { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">
            <div class="navbar-logo"><img src="brand-assets/logo.jpg" alt="ShareShift"></div>
            <span class="navbar-name">ShareShift</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="navbar-center" id="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="workflows.html" class="nav-link">Entities</a>
            <a href="scheduler.html" class="nav-link">Scheduler</a>
            <a href="content.html" class="nav-link active">Content</a>
            <a href="logs.html" class="nav-link">Logs</a>
            <button id="logout-btn" class="btn-signout">Sign Out</button>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">
            <div class="card-title">Add Content</div>
            <div id="message"></div>
            <form id="content-form">
                <input type="hidden" id="content-id">
                <div class="form-group">
                    <label for="content-title">Title</label>
                    <input type="text" id="content-title" class="frost-input" placeholder="e.g., New Product Launch" required>
                </div>
                <div class="form-group">
                    <label for="content-description">Description</label>
                    <textarea id="content-description" class="frost-input" rows="3" placeholder="Describe your content..."></textarea>
                </div>
                <div class="form-group">
                    <label for="content-urls">Resource Image URLs (one per line)</label>
                    <textarea id="content-urls" class="frost-input" rows="3" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg"></textarea>
                </div>
                <button type="submit" class="btn-primary">Save Content</button>
                <button type="button" id="cancel-content-btn" class="btn-secondary" style="display: none;">Cancel</button>
            </form>
        </div>

        <div class="glass-card">
            <div class="card-title">Your Content Items</div>
            <div id="content-list"><p style="color: var(--text-muted);">Loading content items...</p></div>
        </div>
    </div>

    <footer class="site-footer">
        <a href="privacy.html">Privacy Policy</a> &middot; &copy; 2026 ShareShift
    </footer>

    <script src="supabase.js"></script>
    <script>
        let contentItemsData = [];

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (typeof _supabase === 'undefined') { showMessage('Error: Could not connect to the database.', 'error'); return; }
                const user = await getCurrentUser();
                if (!user) { window.location.href = '/products/shareshift/login.html'; return; }

                await loadUserContentItems();
                document.getElementById('content-form').addEventListener('submit', async function(e) { e.preventDefault(); await saveContentItem(); });
                document.getElementById('cancel-content-btn').addEventListener('click', cancelContentEdit);

                document.getElementById('logout-btn').addEventListener('click', async function() {
                    const { error } = await _supabase.auth.signOut();
                    if (error) console.error('Error logging out:', error);
                    clearSupabaseSession();
                    window.location.href = '/products/shareshift/index.html';
                });

                const navToggle = document.getElementById('nav-toggle');
                const navbarCenter = document.getElementById('navbar-center');
                navToggle.addEventListener('click', () => {
                    navToggle.classList.toggle('open');
                    navbarCenter.classList.toggle('open');
                });
                navbarCenter.querySelectorAll('.nav-link').forEach(link => {
                    link.addEventListener('click', () => {
                        navToggle.classList.remove('open');
                        navbarCenter.classList.remove('open');
                    });
                });
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.navbar')) {
                        navToggle.classList.remove('open');
                        navbarCenter.classList.remove('open');
                    }
                });
            } catch (error) { console.error('Error during initialization:', error); showMessage('Error initializing page: ' + error.message, 'error'); }
        });

        async function loadUserContentItems() {
            try {
                const user = await getCurrentUser();
                if (!user) throw new Error('User not authenticated');
                const response = await apiRequest(`${BACKEND_API_URL}/content/${user.id}`);
                const result = await response.json();
                if (!result.success) throw new Error(result.error || 'Failed to load content items');
                const listElement = document.getElementById('content-list');
                if (!result.content || result.content.length === 0) { listElement.innerHTML = '<p style="color: var(--text-muted);">You haven\'t created any content items yet. Create one above to get started.</p>'; return; }
                contentItemsData = result.content;
                let html = '';
                result.content.forEach(item => {
                    html += `<div class="content-item"><div><strong>${escapeHtml(item.title)}</strong><br><small style="color:var(--text-muted);">${escapeHtml(item.description || 'No description')}</small><br><small style="color:var(--text-muted);">Images: ${item.resource_urls ? item.resource_urls.length : 0}</small></div><div><button class="btn-edit" onclick="editContentItem(${item.id})">Edit</button><button class="btn-danger" onclick="deleteContentItem(${item.id})">Delete</button></div></div>`;
                });
                listElement.innerHTML = html;
            } catch (error) { document.getElementById('content-list').innerHTML = '<p style="color:var(--text-muted);">Error loading content items.</p>'; showMessage('Error loading content items: ' + error.message, 'error'); }
        }

        async function saveContentItem() {
            try {
                const contentId = document.getElementById('content-id').value;
                const title = document.getElementById('content-title').value;
                const description = document.getElementById('content-description').value;
                const urlsText = document.getElementById('content-urls').value;
                let resourceUrls = [];
                if (urlsText.trim()) { resourceUrls = urlsText.split('\n').map(u => u.trim()).filter(u => u); }
                if (!title) { showMessage('Please enter a title', 'error'); return; }
                const user = await getCurrentUser();
                if (!user) throw new Error('User not authenticated');
                const contentData = { title, description, resource_urls: resourceUrls, user_id: user.id };
                let response;
                if (contentId) { response = await apiRequest(`${BACKEND_API_URL}/content/${contentId}`, { method: 'PUT', body: JSON.stringify(contentData) }); }
                else { response = await apiRequest(`${BACKEND_API_URL}/content`, { method: 'POST', body: JSON.stringify(contentData) }); }
                const result = await response.json();
                if (!result.success) throw new Error(result.error || 'Failed to save content item');
                showMessage(contentId ? 'Content item updated!' : 'Content item created!', 'success');
                document.getElementById('content-form').reset();
                document.getElementById('content-id').value = '';
                document.getElementById('cancel-content-btn').style.display = 'none';
                await loadUserContentItems();
            } catch (error) { showMessage('Error saving content: ' + error.message, 'error'); }
        }

        function editContentItem(id) {
            const item = contentItemsData.find(i => String(i.id) === String(id));
            if (!item) { showMessage('Could not find content item. Try refreshing.', 'error'); return; }
            document.getElementById('content-id').value = item.id;
            document.getElementById('content-title').value = item.title;
            document.getElementById('content-description').value = item.description || '';
            document.getElementById('content-urls').value = Array.isArray(item.resource_urls) ? item.resource_urls.join('\n') : '';
            document.getElementById('cancel-content-btn').style.display = 'inline-flex';
            document.getElementById('content-form').scrollIntoView();
        }

        function cancelContentEdit() {
            document.getElementById('content-form').reset();
            document.getElementById('content-id').value = '';
            document.getElementById('cancel-content-btn').style.display = 'none';
        }

        async function deleteContentItem(contentId) {
            if (!confirm('Are you sure you want to delete this content item?')) return;
            try {
                const response = await apiRequest(`${BACKEND_API_URL}/content/${contentId}`, { method: 'DELETE' });
                const result = await response.json();
                if (!result.success) throw new Error(result.error || 'Failed to delete');
                showMessage('Content item deleted!', 'success');
                await loadUserContentItems();
            } catch (error) { showMessage('Error deleting: ' + error.message, 'error'); }
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
