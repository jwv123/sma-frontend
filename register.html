<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Social Media Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001f3f, #808080);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* color: white; */
        }

        input, textarea {
            color: black;
        }

        .register-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            width: 300px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: black;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #001f3f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
        }

        button:hover {
            background: #002d50;
        }

        .links {
            text-align: center;
            margin-top: 1rem;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .success {
            background-color: #4CAF50;
            color: white;
        }

        .error {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Register</h2>
        <div id="message"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="login.html">Login</a></p>
            <p><a href="index.html">Back to Home</a></p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const company = document.getElementById('company').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Clear previous messages
            document.getElementById('message').innerHTML = '';

            // Check if passwords match
            if (password !== confirmPassword) {
                document.getElementById('message').innerHTML = '<div class="message error">Passwords do not match!</div>';
                return;
            }

            // Register the user
            const result = await registerUser(username, email, password, company);

            if (result.success) {
                document.getElementById('message').innerHTML = '<div class="message success">' + result.message + '</div>';
                // Redirect to login page after successful registration
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                document.getElementById('message').innerHTML = '<div class="message error">' + result.message + '</div>';
            }
        });
    </script>
</body>
</html>
