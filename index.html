<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareShift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;400;600;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #034985;
            --navy: #024980;
            --blue-mid: #1280C0;
            --blue-bright: #40A0E0;
            --ice: #E0F0F8;
            --ice-light: #B8E0F0;
            --text-primary: #1A2B3D;
            --text-secondary: #4A6078;
            --text-muted: #8A9BB0;
            --surface: #F5F8FB;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(3, 73, 133, 0.1);
            --glass-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(3, 73, 133, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Sora', sans-serif; }

        /* Animated SVG polygon background */
        .polygon-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .polygon-bg svg { width: 100%; height: 100%; }

        .poly-line {
            stroke: rgba(3, 73, 133, 0.18);
            stroke-width: 1.2;
            fill: none;
        }

        .poly-node {
            fill: rgba(18, 128, 192, 0.4);
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(12px, -8px); }
            50% { transform: translate(-6px, 14px); }
            75% { transform: translate(8px, 6px); }
        }

        @keyframes pulse-node {
            0%, 100% { opacity: 0.2; r: 3; }
            50% { opacity: 0.5; r: 4.5; }
        }

        @keyframes line-draw {
            0% { stroke-dashoffset: 400; }
            100% { stroke-dashoffset: 0; }
        }

        .poly-group { animation: drift 20s ease-in-out infinite; }
        .poly-group:nth-child(2) { animation-delay: -5s; animation-duration: 25s; }
        .poly-group:nth-child(3) { animation-delay: -10s; animation-duration: 22s; }
        .poly-group:nth-child(4) { animation-delay: -3s; animation-duration: 28s; }
        .poly-group:nth-child(5) { animation-delay: -8s; animation-duration: 18s; }

        .poly-line {
            stroke-dasharray: 400;
            animation: line-draw 8s ease-in-out infinite alternate;
        }
        .poly-line:nth-child(2n) { animation-delay: -3s; animation-duration: 10s; }
        .poly-line:nth-child(3n) { animation-delay: -6s; animation-duration: 12s; }

        .poly-node { animation: pulse-node 4s ease-in-out infinite; }
        .poly-node:nth-child(2n) { animation-delay: -1.5s; }
        .poly-node:nth-child(3n) { animation-delay: -2.5s; }

        /* Hero */
        .hero {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Frosted glass card on white */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glass-shadow);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(3, 73, 133, 0.15), transparent);
        }

        .logo-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 2.5rem;
            border-radius: 32px;
            overflow: hidden;
            border: 2px solid rgba(3, 73, 133, 0.1);
            box-shadow: 0 8px 32px rgba(3, 73, 133, 0.12);
            position: relative;
            z-index: 1;
        }

        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
            color: var(--navy-deep);
        }

        .hero-sub {
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .nav-links-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 2.25rem;
            border-radius: 14px;
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #1280C0 0%, #40A0E0 100%);
            color: #FFFFFF;
            box-shadow: 0 4px 16px rgba(18, 128, 192, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(18, 128, 192, 0.35);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 2.25rem;
            border-radius: 14px;
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: #FFFFFF;
            border: 1px solid var(--glass-border);
            color: var(--navy-deep);
            box-shadow: 0 2px 8px rgba(3, 73, 133, 0.08);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(3, 73, 133, 0.12);
            border-color: rgba(3, 73, 133, 0.2);
        }

        #dashboard-link { display: none; }

        .site-footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .site-footer a {
            color: var(--blue-mid);
            text-decoration: none;
            transition: color 0.2s;
        }

        .site-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .hero-title { font-size: 2rem; }
            .hero-sub { font-size: 1rem; }
            .glass-card { padding: 2rem 1.5rem; }
            .logo-container { width: 140px; height: 140px; border-radius: 24px; }
        }

        @media (max-width: 480px) {
            .hero-title { font-size: 1.6rem; }
            .hero-sub { font-size: 0.9rem; }
            .glass-card { padding: 1.5rem 1rem; }
            .logo-container { width: 100px; height: 100px; border-radius: 20px; }
            .btn-primary, .btn-secondary { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <!-- Animated SVG Polygon Background -->
    <div class="polygon-bg">
        <svg viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
            <g class="poly-group">
                <line class="poly-line" x1="120" y1="80" x2="280" y2="150"/>
                <line class="poly-line" x1="280" y1="150" x2="350" y2="320"/>
                <line class="poly-line" x1="350" y1="320" x2="180" y2="380"/>
                <line class="poly-line" x1="180" y1="380" x2="120" y2="80"/>
                <line class="poly-line" x1="280" y1="150" x2="180" y2="380"/>
                <circle class="poly-node" cx="120" cy="80" r="3"/>
                <circle class="poly-node" cx="280" cy="150" r="3"/>
                <circle class="poly-node" cx="350" cy="320" r="3"/>
                <circle class="poly-node" cx="180" cy="380" r="3"/>
            </g>
            <g class="poly-group">
                <line class="poly-line" x1="600" y1="200" x2="750" y2="350"/>
                <line class="poly-line" x1="750" y1="350" x2="900" y2="280"/>
                <line class="poly-line" x1="900" y1="280" x2="850" y2="120"/>
                <line class="poly-line" x1="850" y1="120" x2="600" y2="200"/>
                <line class="poly-line" x1="750" y1="350" x2="850" y2="120"/>
                <line class="poly-line" x1="600" y1="200" x2="900" y2="280"/>
                <circle class="poly-node" cx="600" cy="200" r="3"/>
                <circle class="poly-node" cx="750" cy="350" r="3"/>
                <circle class="poly-node" cx="900" cy="280" r="3"/>
                <circle class="poly-node" cx="850" cy="120" r="3"/>
            </g>
            <g class="poly-group">
                <line class="poly-line" x1="1050" y1="500" x2="1200" y2="600"/>
                <line class="poly-line" x1="1200" y1="600" x2="1300" y2="480"/>
                <line class="poly-line" x1="1300" y1="480" x2="1150" y2="420"/>
                <line class="poly-line" x1="1150" y1="420" x2="1050" y2="500"/>
                <line class="poly-line" x1="1050" y1="500" x2="1300" y2="480"/>
                <circle class="poly-node" cx="1050" cy="500" r="3"/>
                <circle class="poly-node" cx="1200" cy="600" r="3"/>
                <circle class="poly-node" cx="1300" cy="480" r="3"/>
                <circle class="poly-node" cx="1150" cy="420" r="3"/>
            </g>
            <g class="poly-group">
                <line class="poly-line" x1="400" y1="550" x2="550" y2="650"/>
                <line class="poly-line" x1="550" y1="650" x2="680" y2="600"/>
                <line class="poly-line" x1="680" y1="600" x2="620" y2="500"/>
                <line class="poly-line" x1="620" y1="500" x2="400" y2="550"/>
                <circle class="poly-node" cx="400" cy="550" r="3"/>
                <circle class="poly-node" cx="550" cy="650" r="3"/>
                <circle class="poly-node" cx="680" cy="600" r="3"/>
                <circle class="poly-node" cx="620" cy="500" r="3"/>
            </g>
            <g class="poly-group">
                <line class="poly-line" x1="1050" y1="80" x2="1250" y2="160"/>
                <line class="poly-line" x1="1250" y1="160" x2="1180" y2="300"/>
                <line class="poly-line" x1="1050" y1="80" x2="1180" y2="300"/>
                <circle class="poly-node" cx="1050" cy="80" r="3"/>
                <circle class="poly-node" cx="1250" cy="160" r="3"/>
                <circle class="poly-node" cx="1180" cy="300" r="3"/>
            </g>
            <line class="poly-line" x1="350" y1="320" x2="600" y2="200" style="animation-delay: -2s; opacity: 0.6; stroke-width: 1;"/>
            <line class="poly-line" x1="900" y1="280" x2="1050" y2="500" style="animation-delay: -7s; opacity: 0.5; stroke-width: 1;"/>
            <line class="poly-line" x1="680" y1="600" x2="750" y2="350" style="animation-delay: -4s; opacity: 0.6; stroke-width: 1;"/>
            <line class="poly-line" x1="180" y1="380" x2="400" y2="550" style="animation-delay: -9s; opacity: 0.5; stroke-width: 1;"/>
        </svg>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="glass-card" style="max-width: 560px;">
            <div class="logo-container">
                <img src="brand-assets/logo.jpg" alt="ShareShift">
            </div>
            <h1 class="hero-title">ShareShift</h1>
            <p class="hero-sub">Streamline your social media management with intelligent entity scheduling and content automation.</p>
            <div class="nav-links">
                <div class="nav-links-row">
                    <a href="login.html" class="btn-primary">Sign In</a>
                    <a href="register.html" class="btn-secondary">Create Account</a>
                </div>
                <a href="dashboard.html" id="dashboard-link" class="btn-secondary" style="margin-top: 0.75rem;">Go to Dashboard</a>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <a href="privacy.html">Privacy Policy</a> &middot; &copy; 2026 ShareShift
    </footer>

    <script src="supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const user = await getCurrentUser();
            if (user) {
                document.getElementById('dashboard-link').style.display = 'inline-flex';
            }
        });
    </script>
</body>
</html>
