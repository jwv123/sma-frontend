<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/products/shareshift/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflows — ShareShift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;400;600;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #034985;
            --navy: #024980;
            --blue-mid: #1280C0;
            --blue-bright: #40A0E0;
            --ice: #E0F0F8;
            --ice-light: #B8E0F0;
            --text-primary: #1A2B3D;
            --text-secondary: #4A6078;
            --text-muted: #8A9BB0;
            --surface: #F5F8FB;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(3, 73, 133, 0.1);
            --glass-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(3, 73, 133, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            color: var(--text-primary);
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Sora', sans-serif; }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 2rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 1px 4px rgba(3, 73, 133, 0.04);
        }

        .navbar-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }

        .navbar-logo {
            width: 60px; height: 60px; border-radius: 14px; overflow: hidden;
            border: 1px solid var(--glass-border); box-shadow: 0 2px 8px rgba(3, 73, 133, 0.08); flex-shrink: 0;
            transition: all 0.3s;
        }

        .navbar-logo img { width: 100%; height: 100%; object-fit: cover; }

        .navbar-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.35rem; color: var(--navy-deep); }

        .nav-toggle {
            display: none; flex-direction: column; gap: 5px;
            background: none; border: none; cursor: pointer; padding: 0.5rem; z-index: 110;
        }

        .nav-toggle span {
            display: block; width: 24px; height: 2px;
            background: var(--navy-deep); border-radius: 2px; transition: all 0.3s;
        }

        .nav-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.open span:nth-child(2) { opacity: 0; }
        .nav-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .navbar-center { display: flex; gap: 0.25rem; align-items: center; }

        .nav-link {
            color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
            padding: 0.5rem 1rem; border-radius: 10px; transition: all 0.2s; white-space: nowrap;
        }

        .nav-link:hover { color: var(--navy-deep); background: rgba(3, 73, 133, 0.05); }
        .nav-link.active { color: var(--blue-mid); background: rgba(18, 128, 192, 0.08); }

        .btn-signout {
            padding: 0.5rem 1.25rem; border-radius: 10px; font-family: 'Sora', sans-serif;
            font-weight: 600; font-size: 0.82rem; cursor: pointer;
            border: 1px solid rgba(220, 53, 69, 0.2); background: rgba(220, 53, 69, 0.06); color: #A82030; transition: all 0.2s;
        }

        .btn-signout:hover { background: rgba(220, 53, 69, 0.12); color: #881828; }

        /* Content */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
            box-shadow: var(--glass-shadow);
        }

        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(3, 73, 133, 0.15), transparent);
        }

        .card-title { font-family: 'Sora', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--navy-deep); }

        .form-group { margin-bottom: 1.25rem; }

        .form-group label {
            display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;
            color: var(--text-secondary); letter-spacing: 0.03em;
        }

        .frost-input {
            width: 100%; padding: 0.75rem 1rem; border-radius: 12px;
            border: 1px solid rgba(3, 73, 133, 0.12); background: #FFFFFF;
            color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
            transition: all 0.3s ease; outline: none;
        }

        .frost-input::placeholder { color: var(--text-muted); }
        .frost-input:focus { border-color: rgba(18, 128, 192, 0.5); box-shadow: 0 0 0 3px rgba(18, 128, 192, 0.1); }

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.65rem 1.5rem; border-radius: 12px; font-family: 'Sora', sans-serif;
            font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none;
            transition: all 0.3s; margin-right: 0.5rem;
            background: linear-gradient(135deg, #1280C0, #40A0E0); color: #FFFFFF;
            box-shadow: 0 4px 16px rgba(18, 128, 192, 0.25);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(18, 128, 192, 0.35); }

        .btn-danger {
            display: inline-flex; padding: 0.65rem 1.5rem; border-radius: 12px;
            font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s; margin-right: 0.5rem;
            border: 1px solid rgba(220, 53, 69, 0.2); background: rgba(220, 53, 69, 0.06); color: #A82030;
        }

        .btn-danger:hover { background: rgba(220, 53, 69, 0.12); }

        .btn-trigger {
            display: inline-flex; padding: 0.65rem 1.5rem; border-radius: 12px;
            font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; border: none; transition: all 0.3s; margin-right: 0.5rem;
            background: linear-gradient(135deg, #1280C0, #40A0E0); color: #FFFFFF;
            box-shadow: 0 2px 8px rgba(18, 128, 192, 0.2);
        }

        .btn-trigger:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(18, 128, 192, 0.3); }
        .btn-trigger:disabled { opacity: 0.6; cursor: not-allowed; }

        .workflow-item {
            background: #FFFFFF; border: 1px solid var(--glass-border); border-radius: 14px;
            padding: 1.25rem; margin-bottom: 0.75rem;
            display: flex; justify-content: space-between; align-items: center; transition: all 0.2s;
        }

        .workflow-item:hover { border-color: rgba(18, 128, 192, 0.2); box-shadow: 0 2px 8px rgba(3, 73, 133, 0.05); }

        .message { padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 12px; font-size: 0.9rem; }

        .success { background: rgba(40, 167, 69, 0.1); border: 1px solid rgba(40, 167, 69, 0.2); color: #1A7A30; }
        .error { background: rgba(220, 53, 69, 0.08); border: 1px solid rgba(220, 53, 69, 0.2); color: #A82030; }

        @media (max-width: 768px) {
            .navbar { padding: 0.75rem 1rem; }
            .nav-toggle { display: flex; }
            .navbar-logo { width: 44px; height: 44px; border-radius: 10px; }
            .navbar-name { font-size: 1.15rem; }
            .navbar-center {
                display: none; position: absolute; top: 100%; left: 0; right: 0;
                flex-direction: column; background: rgba(255, 255, 255, 0.97);
                backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--glass-border);
                box-shadow: 0 8px 24px rgba(3, 73, 133, 0.08);
                padding: 1rem; gap: 0.25rem;
            }
            .navbar-center.open { display: flex; }
            .nav-link { padding: 0.75rem 1rem; border-radius: 10px; }
            .btn-signout { margin-top: 0.5rem; width: 100%; text-align: center; justify-content: center; }
            .container { padding: 1rem; }
            .glass-card { padding: 1.5rem; }
            .workflow-item { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
            .workflow-item > div:last-child { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        }

        @media (max-width: 480px) {
            .navbar-logo { width: 40px; height: 40px; border-radius: 8px; }
            .navbar-name { font-size: 1.05rem; }
            .container { padding: 0.75rem; }
            .glass-card { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">
            <div class="navbar-logo"><img src="brand-assets/logo.jpg" alt="ShareShift"></div>
            <span class="navbar-name">ShareShift</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="navbar-center" id="navbar-center">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="workflows.html" class="nav-link active">Workflows</a>
            <a href="scheduler.html" class="nav-link">Scheduler</a>
            <a href="content.html" class="nav-link">Content</a>
            <a href="logs.html" class="nav-link">Logs</a>
            <button id="logout-btn" class="btn-signout">Sign Out</button>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">
            <div class="card-title">Add Workflow</div>
            <div id="message"></div>
            <form id="workflow-form">
                <div class="form-group">
                    <label for="workflow-name">Workflow Name</label>
                    <input type="text" id="workflow-name" class="frost-input" placeholder="e.g., Daily Post Scheduler" required>
                </div>
                <div class="form-group">
                    <label for="workflow-id">Workflow ID</label>
                    <input type="text" id="workflow-id" class="frost-input" placeholder="Enter n8n workflow ID" required>
                </div>
                <button type="submit" class="btn-primary">Add Workflow</button>
            </form>
        </div>

        <div class="glass-card">
            <div class="card-title">Your Saved Workflows</div>
            <div id="workflows-list">
                <p style="color: var(--text-muted);">Loading workflows...</p>
            </div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (typeof _supabase === 'undefined') { showMessage('Error: Could not connect to the database.', 'error'); return; }
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) { window.location.href = '/products/shareshift/login.html'; return; }

                loadWorkflows();

                document.getElementById('workflow-form').addEventListener('submit', async function(e) { e.preventDefault(); await addWorkflow(); });
                document.getElementById('logout-btn').addEventListener('click', async function() {
                    const { error } = await _supabase.auth.signOut();
                    if (error) console.error('Error logging out:', error);
                    window.location.href = '/products/shareshift/index.html';
                });

                const navToggle = document.getElementById('nav-toggle');
                const navbarCenter = document.getElementById('navbar-center');
                navToggle.addEventListener('click', () => {
                    navToggle.classList.toggle('open');
                    navbarCenter.classList.toggle('open');
                });
                navbarCenter.querySelectorAll('.nav-link').forEach(link => {
                    link.addEventListener('click', () => {
                        navToggle.classList.remove('open');
                        navbarCenter.classList.remove('open');
                    });
                });
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.navbar')) {
                        navToggle.classList.remove('open');
                        navbarCenter.classList.remove('open');
                    }
                });
            } catch (error) { showMessage('Error initializing page: ' + error.message, 'error'); }
        });

        async function loadWorkflows() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) throw new Error('User not authenticated');
                const { data, error } = await _supabase.from('user_workflows').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                if (error) throw error;
                const listElement = document.getElementById('workflows-list');
                if (data.length === 0) { listElement.innerHTML = '<p style="color: var(--text-muted);">You haven\'t saved any workflows yet.</p>'; return; }
                let html = '';
                data.forEach(workflow => {
                    const safeWorkflowId = workflow.workflow_id.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeId = String(workflow.id).replace(/'/g, "\\'");
                    html += `<div class="workflow-item"><div><strong>${escapeHtml(workflow.name)}</strong><br><small style="color: var(--text-muted); font-family: monospace; font-size: 0.8rem;">ID: ${escapeHtml(workflow.workflow_id)}</small></div><div><button class="btn-trigger" onclick="triggerWorkflowButton('${escapeHtml(workflow.workflow_id)}', event || window.event)">Trigger</button><button class="btn-danger" onclick="deleteWorkflow('${safeId}', this)">Delete</button></div></div>`;
                });
                listElement.innerHTML = html;
            } catch (error) { document.getElementById('workflows-list').innerHTML = '<p style="color: var(--text-muted);">Error loading workflows.</p>'; showMessage('Error loading workflows: ' + error.message, 'error'); }
        }

        async function addWorkflow() {
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) throw new Error('User not authenticated');
                const name = document.getElementById('workflow-name').value;
                const workflowId = document.getElementById('workflow-id').value;
                if (!name || !workflowId) { showMessage('Please fill in all fields', 'error'); return; }
                const { data, error } = await _supabase.from('user_workflows').insert([{ user_id: user.id, name, workflow_id: workflowId }]).select();
                if (error) throw error;
                showMessage('Workflow added successfully!', 'success');
                document.getElementById('workflow-form').reset();
                loadWorkflows();
            } catch (error) { showMessage('Error adding workflow: ' + error.message, 'error'); }
        }

        async function deleteWorkflow(workflowId, buttonElement) {
            if (!confirm('Are you sure you want to delete this workflow?')) return;
            try {
                const { error } = await _supabase.from('user_workflows').delete().eq('id', workflowId);
                if (error) throw error;
                showMessage('Workflow deleted successfully!', 'success');
                if (buttonElement) buttonElement.closest('.workflow-item').remove(); else loadWorkflows();
            } catch (error) { showMessage('Error deleting workflow: ' + error.message, 'error'); }
        }

        async function triggerWorkflowButton(workflowId, evt) {
            const btn = evt ? evt.target : (window.event ? window.event.target : null);
            try {
                if (!workflowId) { showMessage('Error: Workflow ID is missing', 'error'); if (btn) { btn.textContent = 'Trigger'; btn.disabled = false; } return; }
                if (btn) { btn.textContent = 'Triggering...'; btn.disabled = true; }
                if (typeof window.triggerWorkflow !== 'function') throw new Error('triggerWorkflow function is not available');
                const result = await window.triggerWorkflow(workflowId);
                if (result && typeof result.success !== 'undefined') {
                    if (result.success) { showMessage(result.message, 'success'); }
                    else { let m = result.message || 'Unknown error'; if (result.errorDetails) m += ' (' + result.errorDetails + ')'; if (result.details) m += ' - ' + result.details; showMessage('Error: ' + m, 'error'); }
                } else { let m = result && result.message ? result.message : 'Unknown error'; if (result && result.errorDetails) m += ' (' + result.errorDetails + ')'; showMessage('Error: ' + m, 'error'); }
                if (btn) { btn.textContent = 'Trigger'; btn.disabled = false; }
            } catch (error) { showMessage('Error: ' + (error.message || 'Unknown error'), 'error'); if (btn) { btn.textContent = 'Trigger'; btn.disabled = false; } }
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
